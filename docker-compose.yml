networks:
  worf:
    name: worf
    driver: bridge

services:
  apk-server:
    image: cgr.dev/chainguard/nginx:latest-dev
    container_name: apk-server
    ports:
      - "8080:8080"
    volumes:
      - ./infra/packages:/var/www/apks:rw
      - ./infra/nginx:/etc/nginx/conf.d
      - ./infra/packages:/var/cache/nginx/apk:rw
    restart: unless-stopped
    networks:
      - worf

  apko-flask-server:
    build:
      context: ./infra/apko_server
      dockerfile: Dockerfile
    container_name: apko-flask-server
    network_mode: host
    volumes:
      - ./infra/images:/app/images
    environment:
      - REGISTRY_HOST=localhost:5000
      - ENABLE_WOLFI_SOURCE=1

  registry:
    image: registry:2
    container_name: registry.localhost
    ports:
      - "5000:5000"
    volumes:
      - ./infra/registry-data:/var/lib/registry
    networks:
      - worf


