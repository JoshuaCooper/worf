proxy_cache_path /var/cache/nginx/wolfi
    levels=1:2
    keys_zone=wolfi_cache:10m
    max_size=2g
    inactive=7d
    use_temp_path=off;

# ──────────────────────────────────────────────
# apkrepo — Wolfi OS package mirror / cache
# ──────────────────────────────────────────────
server {
    listen 8081;
    server_name apkrepo;

    server_tokens      off;

    access_log  /var/log/nginx/apkrepo.access.log combined;
    error_log   /var/log/nginx/apkrepo.error.log warn;

    # Timeouts suitable for large package downloads
    proxy_connect_timeout      10s;
    proxy_send_timeout         60s;
    proxy_read_timeout         60s;

    location / {
        proxy_pass             https://packages.wolfi.dev;
        proxy_set_header       Host packages.wolfi.dev;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_ssl_server_name  on;

        # Caching
        proxy_cache            wolfi_cache;
        proxy_cache_key        "$scheme$proxy_host$request_uri";
        proxy_cache_valid      200 206 7d;
        proxy_cache_valid      301 302 1d;
        proxy_cache_valid      any 1m;
        proxy_cache_use_stale  error timeout updating
                               http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;

        # Respect upstream cache headers
        proxy_ignore_headers   Cache-Control Set-Cookie;
        proxy_hide_header      Set-Cookie;

        # Support range requests (needed for partial package downloads)
        proxy_set_header       Range $http_range;
        proxy_set_header       If-Range $http_if_range;
        proxy_no_cache         $http_pragma;
        proxy_cache_bypass     $http_pragma;

        # Expose cache status for debugging
        add_header             X-Cache-Status $upstream_cache_status always;
    }

    # Local package repository — served from host-mounted directory
    location /local/ {
        alias /srv/local-repo/;
        autoindex on;
        try_files $uri $uri/ =404;
    }

    # Site-level error handling
    error_page 502 503 504 /upstream_error.html;
    location = /upstream_error.html {
        internal;
        return 503 '{"error":"apkrepo upstream unavailable"}';
        add_header Content-Type application/json always;
    }
}

# ──────────────────────────────────────────────
# catchall — trap unmatched requests on 8080
# ──────────────────────────────────────────────
server {
    listen 8080 default_server;
    server_name _;

    server_tokens  off;

    access_log  /var/log/nginx/catchall.access.log combined;
    error_log   /var/log/nginx/catchall.error.log warn;

    location / {
        return 444;  # Drop connection silently, no response sent
    }
}
